name: Axiom CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: 1.26.5
  NODE_VERSION: 24.18.0
  PNPM_VERSION: 11.12.0

jobs:
  quality:
    name: Format, lint, test, contracts, and safety
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install required runner tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Activate exact pnpm
        run: |
          corepack enable
          corepack install --global pnpm@${PNPM_VERSION}
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Run local-equivalent quality gate
        run: make verify

  postgres-smoke:
    name: PostgreSQL readiness and process smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: axiom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d axiom"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Provision least-privilege smoke roles
        env:
          POSTGRES_SERVICE_ID: ${{ job.services.postgres.id }}
        run: |
          for role in axiom_app axiom_recorder axiom_readonly; do
            docker exec "${POSTGRES_SERVICE_ID}" psql \
              --username postgres --dbname axiom --set=ON_ERROR_STOP=1 \
              --command "CREATE ROLE ${role} NOLOGIN"
          done
      - name: Run all platform command forms and health transitions
        env:
          AXIOM_SMOKE_DB_HOST: 127.0.0.1
          AXIOM_SMOKE_DB_PORT: "5432"
          AXIOM_SMOKE_DB_USER: postgres
          AXIOM_SMOKE_DB_NAME: axiom
        run: tests/integration/smoke-platform.sh

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Reject vulnerable or disallowed dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          license-check: true
          allow-licenses: Apache-2.0, BSD-2-Clause, BSD-2-Clause-Views, BSD-3-Clause, ISC, MIT, MIT-0, MPL-2.0, PostgreSQL, 0BSD, CC-BY-4.0, CC0-1.0, BlueOak-1.0.0, LicenseRef-scancode-google-patent-license-golang, Unlicense

  secret-scan:
    name: Full-history secret scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Add a scan boundary for root commits
        shell: bash
        run: |
          empty_tree="$(git mktree </dev/null)"
          synthetic_parent="$({
            printf 'Synthetic empty parent for the CI secret-scan boundary\n'
          } | git -c user.name='Axiom CI' -c user.email='ci@invalid.example' \
            commit-tree "${empty_tree}")"
          while IFS= read -r root_commit; do
            git replace --graft "${root_commit}" "${synthetic_parent}"
          done < <(git rev-list --max-parents=0 HEAD)
      - name: Scan with Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image:
    name: Image, clean deployment, SBOM, license, and vulnerability gates
    needs: [quality, postgres-smoke]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install required runner tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build immutable candidate input
        run: >-
          make image IMAGE=axiom:ci VERSION=0.1.0-ci COMMIT=${GITHUB_SHA}
          BUILT_AT=ci DIRTY=false
      - name: Inspect non-root minimal runtime
        run: scripts/inspect-image.sh axiom:ci
      - name: Prove reproducible runtime payload
        run: |
          mkdir -p artifacts
          make image-reproducibility IMAGE=axiom:ci REBUILD_IMAGE=axiom:ci-rebuild \
            VERSION=0.1.0-ci COMMIT=${GITHUB_SHA} BUILT_AT=ci DIRTY=false | \
            tee artifacts/image-reproducibility.txt
      - name: Walk through image-backed application setup
        run: make compose-smoke IMAGE=axiom:ci
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: axiom:ci
          format: spdx-json
          output-file: artifacts/axiom.spdx.json
      - name: Scan image vulnerabilities, secrets, misconfiguration, and licenses
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: axiom:ci
          format: sarif
          output: artifacts/trivy.sarif
          scanners: vuln,secret,misconfig,license
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true
          ignore-unfixed: false
          exit-code: "1"
      - name: Record image digest
        run: docker image inspect --format '{{.Id}}' axiom:ci > artifacts/image-digest.txt
      - name: Upload supply-chain evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: a1-supply-chain-evidence
          path: artifacts/
          if-no-files-found: error
