name: ${COMPOSE_PROJECT_NAME:-axiom}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

x-runtime-environment: &runtime-environment
  DEPLOYMENT_ENV: ${DEPLOYMENT_ENV:-local}
  APP_INSTANCE_ID: ${APP_INSTANCE_ID:-axiom-local-shadow-01}
  APP_TIMEZONE: UTC
  COLLECTOR_REGION: ${COLLECTOR_REGION:-local}
  APP_FAIL_CLOSED: ${APP_FAIL_CLOSED:-true}
  APP_SHUTDOWN_TIMEOUT: ${APP_SHUTDOWN_TIMEOUT:-60s}
  APP_CONFIG_FILE: ${APP_CONFIG_FILE:-/etc/axiom/platform.json}
  RISK_POLICY_FILE: ${RISK_POLICY_FILE:-/etc/axiom/risk-shadow.yaml}
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB:-axiom}
  DB_USER: ${POSTGRES_RUNTIME_USER:-axiom_app}
  DB_PASSWORD_FILE: /run/secrets/postgres_runtime_password
  DB_SSL_MODE: ${DB_SSL_MODE:-disable}
  DB_MAX_OPEN_CONNECTIONS: ${DB_MAX_OPEN_CONNECTIONS:-30}
  DB_CONNECTION_MAX_LIFETIME: ${DB_CONNECTION_MAX_LIFETIME:-30m}
  DB_CONNECTION_TIMEOUT: ${DB_CONNECTION_TIMEOUT:-5s}
  DB_STATEMENT_TIMEOUT: ${DB_STATEMENT_TIMEOUT:-10s}
  HTTP_BIND_ADDRESS: 0.0.0.0:8080
  METRICS_BIND_ADDRESS: 0.0.0.0:9091
  HEALTH_DETAIL_TOKEN_FILE: /run/secrets/health_detail_token
  API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://localhost:8080}
  WEB_ALLOWED_ORIGINS: ${WEB_ALLOWED_ORIGINS:-http://localhost:8080}
  TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-false}
  BINANCE_PUBLIC_MARKET_DATA_ENABLED: ${BINANCE_PUBLIC_MARKET_DATA_ENABLED:-true}
  BINANCE_PUBLIC_ENDPOINT_SET: market-data-only-v1
  EXCHANGE_HTTP_TIMEOUT: ${EXCHANGE_HTTP_TIMEOUT:-5s}
  EXCHANGE_TIME_SYNC_INTERVAL: ${EXCHANGE_TIME_SYNC_INTERVAL:-30s}
  EXCHANGE_METADATA_REFRESH_INTERVAL: ${EXCHANGE_METADATA_REFRESH_INTERVAL:-1h}
  EXCHANGE_RECONNECT_MIN_BACKOFF: ${EXCHANGE_RECONNECT_MIN_BACKOFF:-1s}
  EXCHANGE_RECONNECT_MAX_BACKOFF: ${EXCHANGE_RECONNECT_MAX_BACKOFF:-30s}
  RECONCILIATION_ON_START: ${RECONCILIATION_ON_START:-true}
  RECONCILIATION_ON_RECONNECT: ${RECONCILIATION_ON_RECONNECT:-true}
  RECONCILIATION_INTERVAL: ${RECONCILIATION_INTERVAL:-30s}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: json
  LOG_OUTPUT: stdout
  METRICS_ENABLED: ${METRICS_ENABLED:-true}
  PPROF_ENABLED: ${PPROF_ENABLED:-false}
  OTEL_TRACING_ENABLED: ${OTEL_TRACING_ENABLED:-false}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  ALERT_IN_APP_ENABLED: ${ALERT_IN_APP_ENABLED:-true}
  ALERT_WEBHOOK_ENABLED: ${ALERT_WEBHOOK_ENABLED:-false}
  ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
  ALERT_WEBHOOK_ALLOWED_HOST: ${ALERT_WEBHOOK_ALLOWED_HOST:-}
  ALERT_WEBHOOK_TOKEN_FILE: ${ALERT_WEBHOOK_TOKEN_FILE:-}
  RISK_INITIAL_STATE: ${RISK_INITIAL_STATE:-PAUSED}
  RISK_AUTO_UNPAUSE: ${RISK_AUTO_UNPAUSE:-false}
  RISK_FAIL_CLOSED: ${RISK_FAIL_CLOSED:-true}
  RISK_REQUIRE_HEALTHY_BOOK: ${RISK_REQUIRE_HEALTHY_BOOK:-true}
  RISK_MAX_ACCOUNT_DRAWDOWN_PCT: ${RISK_MAX_ACCOUNT_DRAWDOWN_PCT:-5.00}
  RISK_MAX_DAILY_LOSS_PCT: ${RISK_MAX_DAILY_LOSS_PCT:-1.00}
  RISK_MAX_STRATEGY_LOSS_PCT: ${RISK_MAX_STRATEGY_LOSS_PCT:-3.00}
  RISK_MAX_SINGLE_VOLATILE_ASSET_EXPOSURE_PCT: ${RISK_MAX_SINGLE_VOLATILE_ASSET_EXPOSURE_PCT:-30.00}
  RISK_MAX_TOTAL_VOLATILE_ASSET_EXPOSURE_PCT: ${RISK_MAX_TOTAL_VOLATILE_ASSET_EXPOSURE_PCT:-50.00}
  RISK_MAX_EXCHANGE_EXPOSURE_PCT: ${RISK_MAX_EXCHANGE_EXPOSURE_PCT:-60.00}
  RISK_MIN_GLOBAL_RESERVE_PCT: ${RISK_MIN_GLOBAL_RESERVE_PCT:-15.00}
  RISK_MAX_RESERVED_CAPITAL_PCT: ${RISK_MAX_RESERVED_CAPITAL_PCT:-85.00}
  RISK_MAX_OPEN_ORDERS: ${RISK_MAX_OPEN_ORDERS:-8}
  RISK_MAX_SPREAD_BPS: ${RISK_MAX_SPREAD_BPS:-100}
  RISK_MAX_SLIPPAGE_BPS: ${RISK_MAX_SLIPPAGE_BPS:-50}
  RISK_ARBITRAGE_ADDITIONAL_SAFETY_BUFFER_BPS: ${RISK_ARBITRAGE_ADDITIONAL_SAFETY_BUFFER_BPS:-15}
  RISK_ARBITRAGE_MAX_BOOK_AGE_MS: ${RISK_ARBITRAGE_MAX_BOOK_AGE_MS:-250}
  RISK_MAX_QUEUE_LAG_MS: ${RISK_MAX_QUEUE_LAG_MS:-250}
  RISK_MAX_CLOCK_DRIFT_MS: ${RISK_MAX_CLOCK_DRIFT_MS:-100}
  RISK_MIN_MARKET_DATA_QUALITY_SCORE: ${RISK_MIN_MARKET_DATA_QUALITY_SCORE:-90}
  RISK_LOCK_ON_UNKNOWN_ORDER: ${RISK_LOCK_ON_UNKNOWN_ORDER:-true}
  RISK_LOCK_ON_RECONCILIATION_MISMATCH: ${RISK_LOCK_ON_RECONCILIATION_MISMATCH:-true}
  RISK_LOCK_ON_CRITICAL_PERSISTENCE_FAILURE: ${RISK_LOCK_ON_CRITICAL_PERSISTENCE_FAILURE:-true}

x-app-base: &app-base
  image: ${APP_IMAGE:-CHANGE_ME/axiom:CHANGE_ME}
  pull_policy: ${APP_PULL_POLICY:-missing}
  init: true
  # The pinned PostgreSQL Alpine image uses GID 70. File-backed Compose secrets
  # are group-readable (0640) because Compose cannot remap file-source UID/GID.
  user: "${APP_UID:-10001}:${APP_GID:-70}"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=64m
  restart: ${CONTAINER_RESTART_POLICY:-unless-stopped}
  stop_grace_period: 60s
  pids_limit: 256
  logging: *default-logging

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.4-alpine}
    restart: ${CONTAINER_RESTART_POLICY:-unless-stopped}
    stop_grace_period: 90s
    shm_size: 256mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-axiom}
      POSTGRES_USER: ${POSTGRES_OWNER_USER:-axiom_owner}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_owner_password
      POSTGRES_MIGRATOR_USER: ${POSTGRES_MIGRATOR_USER:-axiom_migrator}
      POSTGRES_RUNTIME_USER: ${POSTGRES_RUNTIME_USER:-axiom_app}
      POSTGRES_RECORDER_USER: ${POSTGRES_RECORDER_USER:-axiom_recorder}
      POSTGRES_BACKUP_USER: ${POSTGRES_BACKUP_USER:-axiom_backup}
      POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER:-axiom_readonly}
      TZ: UTC
    secrets:
      - postgres_owner_password
      - postgres_migrator_password
      - postgres_runtime_password
      - postgres_recorder_password
      - postgres_backup_password
      - postgres_readonly_password
    volumes:
      # PostgreSQL official images 18+ use versioned PGDATA below this parent.
      - postgres_data:/var/lib/postgresql
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test "$$(cat /proc/1/comm)" = postgres && pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - core
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-2g}
    cpus: ${POSTGRES_CPU_LIMIT:-2.0}
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  migrate:
    <<: *app-base
    profiles: [app, record, workers, backup]
    restart: "no"
    command: ["admin", "migrate"]
    environment:
      <<: *runtime-environment
      DB_USER: ${POSTGRES_MIGRATOR_USER:-axiom_migrator}
      DB_PASSWORD_FILE: /run/secrets/postgres_migrator_password
      POSTGRES_RUNTIME_USER: ${POSTGRES_RUNTIME_USER:-axiom_app}
      POSTGRES_RECORDER_USER: ${POSTGRES_RECORDER_USER:-axiom_recorder}
      POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER:-axiom_readonly}
    secrets:
      - postgres_migrator_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - core
    mem_limit: ${MIGRATE_MEMORY_LIMIT:-512m}
    cpus: ${MIGRATE_CPU_LIMIT:-1.0}

  api:
    <<: *app-base
    profiles: [app]
    command: ["api"]
    environment:
      <<: *runtime-environment
    secrets:
      - postgres_runtime_password
      - health_detail_token
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - core
      - metrics
      - edge
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${API_HOST_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "/app/platform",
          "healthcheck",
          "--url=http://127.0.0.1:8080/health/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    mem_limit: ${API_MEMORY_LIMIT:-1g}
    cpus: ${API_CPU_LIMIT:-2.0}

  engine-shadow:
    <<: *app-base
    profiles: [app]
    command: ["trader", "--mode=shadow"]
    environment:
      <<: *runtime-environment
      EXECUTION_MODE: shadow
      RECORDER_DECISION_INPUTS_ENABLED: "true"
      RECORDER_ROOT: /var/lib/axiom/market-data
    secrets:
      - postgres_runtime_password
      - health_detail_token
    volumes:
      - type: bind
        source: ${MARKET_DATA_HOST_PATH:-./.local/market-data}
        target: /var/lib/axiom/market-data
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - core
      - metrics
      - exchange_egress
    healthcheck:
      test:
        [
          "CMD",
          "/app/platform",
          "healthcheck",
          "--url=http://127.0.0.1:9091/health/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    mem_limit: ${ENGINE_MEMORY_LIMIT:-2g}
    cpus: ${ENGINE_CPU_LIMIT:-4.0}

  recorder:
    <<: *app-base
    profiles: [record]
    command: ["recorder"]
    environment:
      <<: *runtime-environment
      DB_USER: ${POSTGRES_RECORDER_USER:-axiom_recorder}
      DB_PASSWORD_FILE: /run/secrets/postgres_recorder_password
      EXECUTION_MODE: shadow
      RECORDER_ENABLED: ${RECORDER_ENABLED:-true}
      RECORDER_STORE_RAW_PAYLOADS: ${RECORDER_STORE_RAW_PAYLOADS:-true}
      RECORDER_STORE_NORMALIZED_EVENTS: ${RECORDER_STORE_NORMALIZED_EVENTS:-true}
      RECORDER_ROOT: /var/lib/axiom/market-data
      RECORDER_TEMP_ROOT: /var/lib/axiom/market-data/.tmp
      RECORDER_FORMAT: ${RECORDER_FORMAT:-parquet}
      RECORDER_COMPRESSION: ${RECORDER_COMPRESSION:-zstd}
      RECORDER_ZSTD_LEVEL: ${RECORDER_ZSTD_LEVEL:-3}
      RECORDER_CHECKSUM: ${RECORDER_CHECKSUM:-sha256}
      RECORDER_SEGMENT_DURATION: ${RECORDER_SEGMENT_DURATION:-5m}
      RECORDER_SEGMENT_MAX_BYTES: ${RECORDER_SEGMENT_MAX_BYTES:-268435456}
      RECORDER_FLUSH_INTERVAL: ${RECORDER_FLUSH_INTERVAL:-5m}
      RECORDER_FSYNC_ON_FINALIZE: ${RECORDER_FSYNC_ON_FINALIZE:-true}
      RECORDER_RETENTION_DAYS: ${RECORDER_RETENTION_DAYS:-30}
      RECORDER_MIN_FREE_BYTES: ${RECORDER_MIN_FREE_BYTES:-10737418240}
      RECORDER_DISK_PRESSURE_ACTION: ${RECORDER_DISK_PRESSURE_ACTION:-pause_new_decisions}
      MARKET_EVENT_QUEUE_CAPACITY: ${MARKET_EVENT_QUEUE_CAPACITY:-16384}
      PERSISTENCE_QUEUE_CAPACITY: ${PERSISTENCE_QUEUE_CAPACITY:-8192}
      ORDER_BOOK_RETAINED_DEPTH: ${ORDER_BOOK_RETAINED_DEPTH:-1000}
    secrets:
      - postgres_recorder_password
      - health_detail_token
    volumes:
      - type: bind
        source: ${MARKET_DATA_HOST_PATH:-./.local/market-data}
        target: /var/lib/axiom/market-data
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - core
      - metrics
      - exchange_egress
    healthcheck:
      test:
        [
          "CMD",
          "/app/platform",
          "healthcheck",
          "--url=http://127.0.0.1:9091/health/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    mem_limit: ${RECORDER_MEMORY_LIMIT:-2g}
    cpus: ${RECORDER_CPU_LIMIT:-2.0}

  backtest-worker:
    <<: *app-base
    profiles: [workers]
    command: ["worker"]
    environment:
      <<: *runtime-environment
    secrets:
      - postgres_runtime_password
      - health_detail_token
    volumes:
      - type: bind
        source: ${MARKET_DATA_HOST_PATH:-./.local/market-data}
        target: /var/lib/axiom/market-data
        read_only: true
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - core
      - metrics
    healthcheck:
      test:
        [
          "CMD",
          "/app/platform",
          "healthcheck",
          "--url=http://127.0.0.1:9091/health/ready",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    mem_limit: ${WORKER_MEMORY_LIMIT:-4g}
    cpus: ${WORKER_CPU_LIMIT:-4.0}

  backup:
    image: ${BACKUP_IMAGE:-CHANGE_ME/axiom-backup:CHANGE_ME}
    pull_policy: ${BACKUP_PULL_POLICY:-missing}
    profiles: [backup]
    restart: "no"
    user: "10002:70"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["create"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-axiom}
      DB_USER: ${POSTGRES_BACKUP_USER:-axiom_backup}
      DB_PASSWORD_FILE: /run/secrets/postgres_backup_password
      BACKUP_ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      BACKUP_DESTINATION: /backups
      BACKUP_RETENTION_GENERATIONS: ${BACKUP_RETENTION_GENERATIONS:-14}
    secrets:
      - postgres_backup_password
      - backup_encryption_key
    volumes:
      - backup_data:/backups
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m,mode=0700,uid=10002,gid=70
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - core
    mem_limit: ${BACKUP_MEMORY_LIMIT:-512m}
    cpus: ${BACKUP_CPU_LIMIT:-1.0}
    pids_limit: 128
    logging: *default-logging

  restore:
    image: ${BACKUP_IMAGE:-CHANGE_ME/axiom-backup:CHANGE_ME}
    pull_policy: ${BACKUP_PULL_POLICY:-missing}
    profiles: [restore]
    restart: "no"
    user: "10002:70"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command: ["restore"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-axiom}
      DB_USER: ${POSTGRES_MIGRATOR_USER:-axiom_migrator}
      DB_PASSWORD_FILE: /run/secrets/postgres_migrator_password
      BACKUP_ENCRYPTION_KEY_FILE: /run/secrets/backup_encryption_key
      BACKUP_DESTINATION: /backups
      BACKUP_RESTORE_MANIFEST: ${BACKUP_RESTORE_MANIFEST:-}
    secrets:
      - postgres_migrator_password
      - backup_encryption_key
    volumes:
      - backup_data:/backups
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m,mode=0700,uid=10002,gid=70
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - core
    mem_limit: ${BACKUP_MEMORY_LIMIT:-512m}
    cpus: ${BACKUP_CPU_LIMIT:-1.0}
    pids_limit: 128
    logging: *default-logging

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.5.0}
    profiles: [observability]
    read_only: true
    restart: ${CONTAINER_RESTART_POLICY:-unless-stopped}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-20GB}
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - metrics
    mem_limit: ${PROMETHEUS_MEMORY_LIMIT:-1g}
    pids_limit: 128
    logging: *default-logging

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.0.2}
    profiles: [observability]
    user: "472:0"
    read_only: true
    restart: ${CONTAINER_RESTART_POLICY:-unless-stopped}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_DOMAIN: ${APP_DOMAIN:-localhost}
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks:
      - metrics
      - edge
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${GRAFANA_HOST_PORT:-3000}:3000"
    mem_limit: ${GRAFANA_MEMORY_LIMIT:-512m}
    pids_limit: 128
    logging: *default-logging

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.10.0-alpine}
    profiles: [edge]
    read_only: true
    restart: ${CONTAINER_RESTART_POLICY:-unless-stopped}
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-CHANGE_ME@example.invalid}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    networks:
      - edge
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    pids_limit: 128
    logging: *default-logging

networks:
  core:
    internal: true
  metrics:
    internal: true
  edge: {}
  exchange_egress: {}

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  caddy_data:
  caddy_config:
  backup_data:

secrets:
  postgres_owner_password:
    file: ${SECRETS_DIR:-./.secrets}/postgres_owner_password
  postgres_migrator_password:
    file: ${SECRETS_DIR:-./.secrets}/postgres_migrator_password
  postgres_runtime_password:
    file: ${SECRETS_DIR:-./.secrets}/postgres_runtime_password
  postgres_recorder_password:
    file: ${SECRETS_DIR:-./.secrets}/postgres_recorder_password
  postgres_backup_password:
    file: ${SECRETS_DIR:-./.secrets}/postgres_backup_password
  backup_encryption_key:
    file: ${SECRETS_DIR:-./.secrets}/backup_encryption_key
  postgres_readonly_password:
    file: ${SECRETS_DIR:-./.secrets}/postgres_readonly_password
  grafana_admin_password:
    file: ${SECRETS_DIR:-./.secrets}/grafana_admin_password
  health_detail_token:
    file: ${SECRETS_DIR:-./.secrets}/health_detail_token
