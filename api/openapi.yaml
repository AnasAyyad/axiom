openapi: 3.0.3
info:
  title: Axiom V1A API
  version: 1.0.0
  description: >-
    Authenticated research, replay, and production-public shadow operations.
    Axiom V1A is simulation software and cannot place external orders.
servers:
  - url: /
tags:
  - name: Health
  - name: Session
  - name: System
  - name: Binance
  - name: Portfolio
  - name: Risk
  - name: Trend
  - name: Backtest
  - name: Replay
  - name: Shadow
  - name: Incident
  - name: Audit
  - name: Stream
paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Health]
      summary: Report whether the process loop can respond
      responses:
        "200":
          description: Process is live
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /health/ready:
    get:
      operationId: getReadiness
      tags: [Health]
      summary: Report whether all role prerequisites are ready
      responses:
        "200":
          description: Role is ready
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
        "503":
          $ref: "#/components/responses/HealthUnavailable"
  /api/v1/session/login:
    post:
      operationId: loginSession
      tags: [Session]
      summary: Authenticate and rotate to a fresh opaque session
      parameters:
        - $ref: "#/components/parameters/Origin"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "201":
          description: Authenticated session created
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /api/v1/session/logout:
    post:
      operationId: logoutSession
      tags: [Session]
      summary: Revoke the current session and clear its cookies
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/CSRFToken"
      responses:
        "204": { description: Session revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/session/me:
    get:
      operationId: getCurrentSession
      tags: [Session]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Current user and session projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionMe" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/system/version:
    get:
      operationId: getVersion
      tags: [System]
      responses:
        "200":
          description: Version identity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VersionResponse" }
  /api/v1/system/build:
    get:
      operationId: getBuildInformation
      tags: [System]
      responses:
        "200":
          description: Non-secret build identity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BuildInformation" }
  /api/v1/system/status:
    get:
      operationId: getSystemStatus
      tags: [System]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Current fail-closed system projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SystemStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/system/health:
    get:
      operationId: getDetailedHealth
      tags: [System]
      summary: Return internal redacted dependency detail on the metrics network
      security: [{ operationalBearer: [] }]
      responses:
        "200":
          description: Redacted detailed health
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DetailedHealthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: A dependency is unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DetailedHealthResponse" }
  /api/v1/exchanges/binance/health:
    get:
      operationId: getBinanceHealth
      tags: [Binance]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Production-public Binance health projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BinanceHealth" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/exchanges/binance/instruments:
    get:
      operationId: listBinanceInstruments
      tags: [Binance]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Deterministically ordered Spot metadata
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstrumentPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/portfolios:
    get:
      operationId: listPortfolios
      tags: [Portfolio]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Virtual portfolio summaries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortfolioPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/portfolios/{id}:
    get:
      operationId: getPortfolio
      tags: [Portfolio]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Exact virtual balance and position projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PortfolioDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/portfolios/{id}/journal:
    get:
      operationId: listPortfolioJournal
      tags: [Portfolio]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Exact immutable virtual journal page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JournalPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/risk/status:
    get:
      operationId: getRiskStatus
      tags: [Risk]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Effective global risk state and evidence
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RiskStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/risk/pause:
    post:
      operationId: pauseRisk
      tags: [Risk]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/CSRFToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        $ref: "#/components/requestBodies/RevisionCommand"
      responses:
        "202":
          description: Durable pause command accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommandAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
  /api/v1/risk/resume:
    post:
      operationId: resumeRisk
      tags: [Risk]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/CSRFToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        $ref: "#/components/requestBodies/RevisionCommand"
      responses:
        "202":
          description: Policy-gated durable resume command accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommandAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /api/v1/strategies/trend:
    get:
      operationId: getTrendStrategy
      tags: [Trend]
      security: [{ sessionCookie: [] }]
      responses:
        "200":
          description: Immutable Trend version, parameters, and evidence maturity
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrendStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/strategies/trend/decisions:
    get:
      operationId: listTrendDecisions
      tags: [Trend]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
        - in: query
          name: outcome
          schema: { type: string, enum: [accepted, rejected] }
      responses:
        "200":
          description: Canonical decision and rejection explanations
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TrendDecisionPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/backtests:
    post:
      operationId: createBacktest
      tags: [Backtest]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/CSRFToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OfflineJobRequest" }
      responses:
        "202":
          description: Durable backtest job accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobResource" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /api/v1/backtests/{id}:
    get:
      operationId: getBacktest
      tags: [Backtest]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Backtest lifecycle, result, and reproducibility projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobResource" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/replays:
    post:
      operationId: createReplay
      tags: [Replay]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/CSRFToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplayJobRequest" }
      responses:
        "202":
          description: Durable replay job accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobResource" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/RateLimited" }
  /api/v1/replays/{id}:
    get:
      operationId: getReplay
      tags: [Replay]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - in: query
          name: event_ordinal
          description: Select one persisted canonical replay event; defaults to the newest available event.
          schema: { $ref: "#/components/schemas/Revision" }
      responses:
        "200":
          description: Replay lifecycle and deterministic cursor projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JobResource" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/replays/{id}/pause:
    post:
      operationId: pauseReplay
      tags: [Replay]
      security: [{ sessionCookie: [] }]
      parameters: &replayCommandParameters
        - $ref: "#/components/parameters/ResourceID"
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/CSRFToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        $ref: "#/components/requestBodies/RevisionCommand"
      responses: &commandResponses
        "202":
          description: Durable command accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommandAccepted" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "412": { $ref: "#/components/responses/PreconditionFailed" }
  /api/v1/replays/{id}/resume:
    post:
      operationId: resumeReplay
      tags: [Replay]
      security: [{ sessionCookie: [] }]
      parameters: *replayCommandParameters
      requestBody:
        $ref: "#/components/requestBodies/RevisionCommand"
      responses: *commandResponses
  /api/v1/replays/{id}/step:
    post:
      operationId: stepReplay
      tags: [Replay]
      security: [{ sessionCookie: [] }]
      parameters: *replayCommandParameters
      requestBody:
        $ref: "#/components/requestBodies/RevisionCommand"
      responses: *commandResponses
  /api/v1/shadow-sessions:
    post:
      operationId: createShadowSession
      tags: [Shadow]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - $ref: "#/components/parameters/CSRFToken"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShadowSessionRequest" }
      responses:
        "202":
          description: Public-data simulation-only shadow session accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShadowSessionResource" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/Unavailable" }
  /api/v1/shadow-sessions/{id}/stop:
    post:
      operationId: stopShadowSession
      tags: [Shadow]
      security: [{ sessionCookie: [] }]
      parameters: *replayCommandParameters
      requestBody:
        $ref: "#/components/requestBodies/RevisionCommand"
      responses: *commandResponses
  /api/v1/shadow-sessions/{id}:
    get:
      operationId: getShadowSession
      tags: [Shadow]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/ResourceID"
      responses:
        "200":
          description: Public-data virtual shadow projection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShadowSessionResource" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/incidents:
    get:
      operationId: listIncidents
      tags: [Incident]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
        - in: query
          name: state
          schema: { type: string, enum: [open, acknowledged, resolved] }
      responses:
        "200":
          description: Correlated incident summaries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IncidentPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/incidents/{id}:
    get:
      operationId: getIncident
      tags: [Incident]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/ResourceID"
        - in: query
          name: include_raw
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Correlated redacted incident timeline
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IncidentDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/audit-events:
    get:
      operationId: listAuditEvents
      tags: [Audit]
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/PageSize"
        - in: query
          name: event_type
          schema: { type: string, maxLength: 80 }
        - in: query
          name: include_detail
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Redacted immutable audit page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditEventPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /api/v1/stream:
    get:
      operationId: streamEvents
      tags: [Stream]
      summary: Resume durable operational events after a REST snapshot revision
      security: [{ sessionCookie: [] }]
      parameters:
        - $ref: "#/components/parameters/Origin"
        - in: header
          name: Last-Event-ID
          schema: { $ref: "#/components/schemas/Revision" }
        - in: query
          name: after_revision
          schema: { $ref: "#/components/schemas/Revision" }
      responses:
        "200":
          description: Versioned SSE stream with 15-second heartbeats
          content:
            text/event-stream:
              schema:
                type: string
                description: Each data field is one StreamEvent JSON object.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "410":
          description: Resume cursor expired; fetch fresh REST snapshots
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: axiom_session
    operationalBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
  parameters:
    Origin:
      in: header
      name: Origin
      required: true
      schema: { type: string, format: uri, maxLength: 512 }
    CSRFToken:
      in: header
      name: X-CSRF-Token
      required: true
      schema: { type: string, minLength: 32, maxLength: 512 }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema:
        {
          type: string,
          minLength: 16,
          maxLength: 128,
          pattern: "^[A-Za-z0-9._:-]+$",
        }
    ResourceID:
      in: path
      name: id
      required: true
      schema: { type: string, minLength: 1, maxLength: 160 }
    Cursor:
      in: query
      name: cursor
      schema: { type: string, minLength: 16, maxLength: 1024 }
    PageSize:
      in: query
      name: page_size
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
  requestBodies:
    RevisionCommand:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/RevisionCommandRequest" }
  responses:
    BadRequest:
      description: Request failed safe validation
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Authentication failed
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Authorization, Origin, or CSRF policy denied the request
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Resource not found
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Idempotency payload or lifecycle conflict
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    PreconditionFailed:
      description: Expected entity revision is stale
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    RateLimited:
      description: Durable authentication or workload quota exceeded
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unavailable:
      description: A required fail-closed prerequisite is unavailable
      content:
        { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    HealthUnavailable:
      description: A required dependency is unavailable
      content:
        application/json:
          schema: { $ref: "#/components/schemas/HealthResponse" }
  schemas:
    Decimal:
      type: string
      pattern: "^-?(0|[1-9][0-9]*)(\\.[0-9]+)?$"
      example: "1000.000000000000000000"
    NonnegativeDecimal:
      type: string
      pattern: "^(0|[1-9][0-9]*)(\\.[0-9]+)?$"
    Revision:
      type: string
      pattern: "^(0|[1-9][0-9]*)$"
    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 timestamp with an explicit UTC offset.
    Error:
      type: object
      additionalProperties: false
      required: [code, message, correlation_id]
      properties:
        code: { type: string, minLength: 1, maxLength: 80 }
        message: { type: string, minLength: 1, maxLength: 240 }
        correlation_id: { type: string, minLength: 1, maxLength: 160 }
        field_details:
          type: object
          additionalProperties: { type: string, maxLength: 160 }
    Page:
      type: object
      additionalProperties: false
      required: [revision, has_more]
      properties:
        revision: { $ref: "#/components/schemas/Revision" }
        next_cursor: { type: string, minLength: 16, maxLength: 1024 }
        has_more: { type: boolean }
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, role, phase]
      properties:
        status: { type: string, enum: [live, ready, not_ready] }
        role: { type: string, minLength: 1 }
        phase: { type: string, enum: [A1, A11] }
        reason_code: { type: string, minLength: 1 }
    VersionResponse:
      type: object
      additionalProperties: false
      required: [version]
      properties:
        version: { type: string, minLength: 1 }
    BuildInformation:
      type: object
      additionalProperties: false
      required: [version, commit, built_at, go_version, dirty]
      properties:
        version: { type: string, minLength: 1 }
        commit: { type: string, minLength: 1 }
        built_at: { type: string, minLength: 1 }
        go_version: { type: string, minLength: 1 }
        dirty: { type: boolean }
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, minLength: 3, maxLength: 254 }
        password:
