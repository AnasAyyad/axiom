global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    application: axiom
    deployment: single-server

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:9091"]

  - job_name: engine-shadow
    static_configs:
      - targets: ["engine-shadow:9091"]

  - job_name: recorder
    static_configs:
      - targets: ["recorder:9091"]

  - job_name: backtest-worker
    static_configs:
      - targets: ["backtest-worker:9091"]
